name: Build & Distribute APK to Firebase

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 🐦 Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          channel: 'stable'

      # 📦 Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 🏗️ Build APK
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 🔐 Decode Firebase service account
      - name: Decode Firebase key
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" | base64 --decode > service-account.json

      # 🔧 Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 🚀 Distribute to Firebase
      - name: Upload to Firebase App Distribution
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
          --app ${{ secrets.FIREBASE_APP_ID }} \
          --groups "testers" \
          --release-notes "Automated build from GitHub Actions"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: service-account.json